<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
  :root{
    --sky-top:#a9b8e0;
    --sky-bottom:#7f8fc9;
    --mtn-1:#8f9bd0;
    --mtn-2:#7581bb;
    --mtn-3:#5c68a3;
    --forest:#161230;
    --card-bg:rgba(140,148,200,0.35);
    --card-border:rgba(255,255,255,0.35);
    --ink:#ffffff;
    --accent:#4b3fa0;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    position:relative;
    min-height:100vh;
    overflow-x:hidden;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 55%,#5a5f96 75%,#312a52 100%);
  }
  /* top accent bar */
  body::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,#b98a5e,#8a5b3c);
  }
  .scene{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .mountain{position:absolute;bottom:0;width:100%;}
  .bird{position:absolute;opacity:.5;}
  .forest{
    position:absolute;bottom:0;left:0;right:0;height:120px;
    background:var(--forest);
    clip-path:polygon(0% 100%,0% 60%,2% 40%,4% 65%,6% 30%,8% 60%,10% 45%,13% 70%,16% 25%,18% 55%,21% 40%,24% 68%,27% 35%,30% 60%,33% 20%,36% 55%,39% 45%,42% 70%,45% 30%,48% 60%,51% 40%,54% 65%,57% 25%,60% 58%,63% 42%,66% 68%,69% 33%,72% 60%,75% 45%,78% 70%,81% 28%,84% 58%,87% 40%,90% 65%,93% 32%,96% 60%,98% 45%,100% 65%,100% 100%);
  }
  .topbar{
    position:absolute;top:16px;right:24px;z-index:3;
    display:flex;align-items:center;gap:8px;
  }
  .pill{
    background:rgba(255,255,255,0.9);
    color:#4b3fa0;font-weight:700;font-size:13px;
    padding:8px 14px;border-radius:999px;
    display:flex;align-items:center;gap:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .status{
    position:fixed;bottom:16px;left:16px;z-index:3;
    background:rgba(10,20,15,0.6);
    color:#8ef0c0;font-size:12px;font-weight:600;
    padding:6px 14px;border-radius:999px;
    display:flex;align-items:center;gap:6px;
    border:1px solid rgba(255,255,255,0.08);
  }
  .status .dot{
    width:7px;height:7px;border-radius:50%;
    background:#4ade80;
    box-shadow:0 0 6px #4ade80;
  }

  .card{
    position:relative;z-index:2;
    max-width:340px;
    margin:100px auto 0;
    padding:34px 34px 28px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:18px;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 20px 50px rgba(20,15,60,0.35);
    color:var(--ink);
  }
  h1.title{
    text-align:center;font-size:22px;font-weight:700;
    margin:0 0 22px;
  }
  .field{
    position:relative;margin-bottom:14px;
  }
  .field input{
    width:100%;padding:12px 40px 12px 14px;
    border-radius:10px;border:1px solid rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.12);
    color:#fff;font-size:14px;outline:none;
  }
  .field input::placeholder{color:rgba(255,255,255,0.75);}
  .field input:focus{
    border-color:#fff;
    box-shadow:0 0 0 3px rgba(255,255,255,0.15);
  }
  .field .icon{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    font-size:15px;opacity:.9;
  }
  .row{
    display:flex;align-items:center;justify-content:space-between;
    font-size:12.5px;margin:2px 0 18px;
  }
  .remember{display:flex;align-items:center;gap:6px;}
  .remember input{accent-color:#4b3fa0;}
  a.link{color:#fff;text-decoration:none;}
  a.link:hover{text-decoration:underline;}

  button.btn-primary{
    width:100%;padding:12px;border:none;border-radius:10px;
    background:#fff;color:#4b3fa0;font-weight:700;font-size:15px;
    cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;
  }
  button.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.2);}
  button.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  .divider{
    display:flex;align-items:center;gap:10px;
    margin:18px 0;font-size:11.5px;color:rgba(255,255,255,0.8);
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:rgba(255,255,255,0.35);
  }

  button.btn-google{
    width:100%;padding:11px;border-radius:10px;border:none;
    background:#fff;color:#222;font-weight:600;font-size:14px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;
  }
  button.btn-google:hover{box-shadow:0 8px 18px rgba(0,0,0,.18);}

  .footer-link{
    text-align:center;margin-top:18px;font-size:12.5px;
  }
  .footer-link a{color:#fff;font-weight:600;text-decoration:underline;}

  .msg{
    text-align:center;font-size:12.5px;margin-top:12px;min-height:16px;
  }
  .msg.ok{color:#b6ffcf;}
  .msg.err{color:#ffc2c2;}

  @media (max-width:420px){
    .card{margin:70px 16px 0;max-width:none;}
  }
</style>
</head>
<body>

<div class="scene">
  <svg class="mountain" viewBox="0 0 1440 500" preserveAspectRatio="none" style="opacity:.5">
    <polygon points="0,500 0,260 200,80 420,300 640,120 900,340 1100,60 1300,260 1440,180 1440,500" fill="#8f9bd0"/>
  </svg>
  <svg class="mountain" viewBox="0 0 1440 500" preserveAspectRatio="none" style="opacity:.65">
    <polygon points="0,500 0,340 260,160 500,360 760,200 980,380 1220,140 1440,320 1440,500" fill="#7581bb"/>
  </svg>
  <svg class="mountain" viewBox="0 0 1440 500" preserveAspectRatio="none" style="opacity:.8">
    <polygon points="0,500 0,400 300,240 560,420 820,260 1060,420 1300,220 1440,380 1440,500" fill="#5c68a3"/>
  </svg>
  <svg class="bird" style="top:60px;left:65%;width:40px" viewBox="0 0 40 12"><path d="M0 8 Q10 0 20 8 Q30 0 40 8" stroke="#333" stroke-width="1.5" fill="none"/></svg>
  <svg class="bird" style="top:100px;left:78%;width:30px" viewBox="0 0 40 12"><path d="M0 8 Q10 0 20 8 Q30 0 40 8" stroke="#333" stroke-width="1.5" fill="none"/></svg>
  <div class="forest"></div>
</div>

<div class="topbar">
  <div class="pill">EN</div>
  <div class="pill" title="Translate">🌐</div>
</div>

<div class="status"><span class="dot"></span>Live JSON</div>

<form class="card" id="loginForm">
  <h1 class="title">Login</h1>

  <div class="field">
    <input type="email" name="email" placeholder="Email ID" required>
    <span class="icon">✉️</span>
  </div>

  <div class="field">
    <input type="password" name="password" placeholder="Password" required>
    <span class="icon">🔒</span>
  </div>

  <div class="row">
    <label class="remember">
      <input type="checkbox" name="remember" checked> Remember me
    </label>
    <a href="#" class="link">Forgot Password?</a>
  </div>

  <button type="submit" class="btn-primary" id="submitBtn">Login</button>

  <div class="divider">or continue with</div>

  <button type="button" class="btn-google" id="googleBtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.3 2.8l5.7-5.7C33.6 6.9 29 5 24 5 13 5 4 14 4 25s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-4.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c2.8 0 5.3 1 7.3 2.8l5.7-5.7C33.6 6.9 29 5 24 5c-7.7 0-14.3 4.4-17.7 9.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.2C29.3 36.6 26.8 37.5 24 37.5c-5.3 0-9.7-2.6-11.3-6.9l-6.5 5C9.7 40.5 16.3 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C40.5 36 44 30.9 44 25c0-1.3-.1-2.7-.4-4.5z"/></svg>
    Sign in with Google
  </button>

  <div class="footer-link">Don't have an account? <a href="#">Register</a></div>

  <div class="msg" id="formMsg"></div>
</form>

<script>
  // Replace this with your own Formsfee endpoint, e.g. https://formsfee.com/f/xxxxxxxx
  const FORMSFEE_ENDPOINT = "https://formsfee.com/f/YOUR_FORM_ID";

  const form = document.getElementById("loginForm");
  const submitBtn = document.getElementById("submitBtn");
  const msg = document.getElementById("formMsg");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "";
    msg.className = "msg";
    submitBtn.disabled = true;
    submitBtn.textContent = "Signing in...";

    const data = new FormData(form);

    try {
      const res = await fetch(FORMSFEE_ENDPOINT, {
        method: "POST",
        body: data,
        headers: { "Accept": "application/json" }
      });

      if (res.ok) {
        msg.textContent = "Logged in! Your details were sent successfully.";
        msg.className = "msg ok";
        form.reset();
        document.querySelector('input[name="remember"]').checked = true;
      } else {
        msg.textContent = "Something went wrong. Please try again.";
        msg.className = "msg err";
      }
    } catch (err) {
      msg.textContent = "Network error. Please check your connection.";
      msg.className = "msg err";
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Login";
    }
  });

  document.getElementById("googleBtn").addEventListener("click", () => {
    msg.textContent = "Hook this up to your Google OAuth flow.";
    msg.className = "msg";
  });
</script>

</body>
</html>
